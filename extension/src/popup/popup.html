<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        @font-face {
            font-family: 'Share Tech Mono';
            src: url('../../assets/fonts/ShareTechMono.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --sys-bg-gradient: linear-gradient(180deg, #030914 0%, #071120 100%);
            --sys-color-primary: #00e5ff; /* Cyan */
            --sys-color-secondary: #0088ff; /* Neon Blue */
            --sys-color-accent: #ff9f00; /* Amber */
            --sys-text: #e2e8f0;
            --sys-text-muted: #64748b;
            --sys-border: rgba(0, 229, 255, 0.25);
            --sys-border-hover: rgba(0, 229, 255, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 320px;
            background: var(--sys-bg-gradient);
            color: var(--sys-text);
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            padding: 24px 20px;
            overflow: hidden;
            border: 1px solid rgba(0, 229, 255, 0.15);
            position: relative;
        }

        /* Ambient scanline overlay */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 99;
            background-size: 100% 3px, 6px 100%;
            pointer-events: none;
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
            text-align: center;
        }

        .logo-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin-bottom: 12px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 16px rgba(0, 229, 255, 0.3);
            border: 1px solid var(--sys-color-primary);
        }

        .logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .title {
            color: var(--sys-color-primary);
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1.5px;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.6);
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--sys-text-muted);
            font-size: 9px;
            letter-spacing: 2px;
            margin-top: 4px;
            text-transform: uppercase;
        }

        /* Corner-bracket styled box */
        .frame-box {
            position: relative;
            border: 1px solid rgba(0, 229, 255, 0.15);
            background: rgba(0, 15, 30, 0.4);
            padding: 20px 14px;
            margin-bottom: 16px;
        }

        .corner {
            position: absolute;
            width: 6px;
            height: 6px;
            border: 1.5px solid var(--sys-color-primary);
        }
        .tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }
        .bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }
        .br { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        .architect-label {
            color: var(--sys-text-muted);
            font-size: 10px;
            letter-spacing: 1.5px;
            text-align: center;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .architect-name {
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
        }

        .button-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sys-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 36px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--sys-border);
            color: var(--sys-color-primary);
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .sys-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.15), transparent);
            transition: all 0.4s ease;
        }

        .sys-btn:hover::before {
            left: 100%;
        }

        .sys-btn:hover {
            border-color: var(--sys-border-hover);
            background: rgba(0, 229, 255, 0.05);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.25), inset 0 0 6px rgba(0, 229, 255, 0.1);
            color: #ffffff;
            text-shadow: 0 0 4px rgba(255, 255, 255, 0.5);
        }

        .sys-btn.accent {
            border-color: rgba(255, 159, 0, 0.4);
            color: var(--sys-color-accent);
        }

        .sys-btn.accent:hover {
            border-color: var(--sys-color-accent);
            background: rgba(255, 159, 0, 0.05);
            box-shadow: 0 0 10px rgba(255, 159, 0, 0.25), inset 0 0 6px rgba(255, 159, 0, 0.1);
            color: #ffffff;
            text-shadow: 0 0 4px rgba(255, 255, 255, 0.5);
        }

        .version {
            text-align: center;
            font-size: 9px;
            color: var(--sys-text-muted);
            letter-spacing: 1px;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-container">
            <img class="logo" src="../../assets/logo.png" alt="Hunter System Logo">
        </div>
        <div class="title"> Codeforces Hunter System</div>
        <div class="subtitle">Holographic Overlay Engine</div>
    </div>

    <div class="frame-box">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <div class="architect-label">System Architect</div>
        <div class="architect-name">Mayank Tripathi</div>

        <div class="button-list">
            <a class="sys-btn" href="https://codeforces.com/profile/me_mayank20" target="_blank">[ Codeforces ↗ ]</a>
            <a class="sys-btn" href="https://github.com/me-mayank" target="_blank">[ Github ↗ ]</a>
            <a class="sys-btn" href="https://www.linkedin.com/in/mayank-tripathi-ba4917327/" target="_blank">[ LinkedIn ↗ ]</a>
            <a class="sys-btn accent" href="https://codeforces.com" target="_blank">[ Open System 📊 ]</a>
        </div>
    </div>

    <div class="version">v8.7.40-STABLE</div>

    <script src="popup.js"></script>
</body>
</html>
